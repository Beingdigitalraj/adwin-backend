
name: Fly Deploy
on: [push]
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ 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 }}
